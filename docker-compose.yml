services:

  database:
    image: mysql:8
    container_name: projeto-mysql

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: testdb

    ports:
      - "3306:3306"

    networks:
      - projeto-network


  backend:
    build: ./node-express-server
    container_name: projeto-backend

    ports:
      - "8080:8080"

    environment:
      - PORT=8080

    depends_on:
      - database

    networks:
      - projeto-network


  frontend:
    build: ./react-client
    container_name: projeto-frontend

    ports:
      - "3000:3000"

    environment:
      - PORT=3000

    depends_on:
      - backend

    networks:
      - projeto-network


  cypress:
    build: ./tests
    container_name: projeto-cypress

    depends_on:
      - backend
      - frontend

    networks:
      - projeto-network

    volumes:
      - ./tests/cypress-videos:/app/cypress/videos
      - ./tests/cypress-screenshots:/app/cypress/screenshots

    environment:
      - CYPRESS_API_URL=http://backend:8080
      - CYPRESS_BASE_URL=http://frontend:3000


networks:
  projeto-network:
    driver: bridge